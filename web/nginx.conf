# nginx-Konfiguration für den erato-web-Produktionscontainer.
# Liefert die gebaute SPA aus und proxyt API-Aufrufe an erato-api (gleicher Origin
# → kein CORS). Keycloak läuft über den vorgelagerten Reverse-Proxy (Caddy).

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Statische Assets mit Cache-Header (gehashte Dateinamen → langlebig).
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # API → erato-api (interner Compose-Hostname).
  location /v1/ {
    proxy_pass http://erato-api:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    client_max_body_size 6m;   # Logo-/Bild-Uploads
  }
  location = /health {
    proxy_pass http://erato-api:3001/health;
  }

  # SPA-Fallback: alle übrigen Pfade → index.html.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
